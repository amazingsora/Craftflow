# worldbook/world/main.yml
# 範例世界觀設定。可以多檔（不同地區、不同時代分開放）。

name: 主世界

hard_rules:
  - 魔法只能在午夜後施展
  - 此世界沒有任何科技高於蒸汽機
  - 跨城旅行至少需要三天

soft_rules:
  - 王室成員不被允許單獨出宮
  - 北境的冬季永遠先於曆書記載開始

# 直接禁止出現的詞彙。Surface scan 會用子字串比對直接命中。
forbidden_keywords:
  - 手機
  - 電腦
  - 飛機

factions:
  - name: 北境議會
    stance: 中立
  - name: 南方商盟
    stance: 重商主義

notes: |
  此世界的時間流速與現實一致。任何「光速旅行」「瞬間移動」
  類描述若不在角色魔法定義中，視為違規。
